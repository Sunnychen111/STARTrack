DATA:
  MAX_SAMPLE_INTERVAL: 400
  SAMPLER_MODE: causal
  MULTI_MODAL_LANGUAGE: False
  MULTI_MODAL_VISION: True
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.500
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 224
    NUMBER: 3
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.500
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 112
    NUMBER: 2
  TRAIN:
    DATASETS_NAME:
    - LASOT
    - GOT10K_hard
    LASOT_SPLIT: hard_dense_subset
    LASOT_SPLIT_FILE: "/home/cps/czl/RGBDL/lasot_hard.txt"
    DATASETS_RATIO:
    - 1
    - 1
    SAMPLE_PER_EPOCH: 40000
  USE_NLP:
    TNL2K: False

MODEL:
  ENCODER:
    TYPE: fastitpnb
    STRIDE: 16
    PRETRAIN_TYPE: 'pretrained/itpn/fast_itpn_base_clipl_e1600.pt'
    PATCHEMBED_INIT: halfcopy
    DROP_PATH: 0.1
    TOKEN_TYPE_INDICATE: True
  MAMBA:
    ENABLE: True
    DEPTH: 2
    DIM: 512
    DROP_PATH: 0.1
    WINDOW_SIZE: 14
    FUSION_TYPE: "mssm_lite"
    D_STATE: 8
    D_CONV: 3
    EXPAND: 1
    DT_RANK: "auto"
    MOD_SCALE_INIT: 0.0
    SEARCH_GATE: True
    TEMPLATE_GATE: True
    TEMPLATE_GATE_INIT: 0.1
    TEMPORAL_ENABLE: True
    TEMPORAL_D_STATE: 4
    TEMPORAL_EXPAND: 1
    TEMPORAL_CHECKPOINT: True
    DEPTH_DROPOUT: 0.3
    TEMPORAL_DROPOUT: 0.3
  TEXT_ENCODER:
    TYPE: ViT-L/14
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  TASK_DECODER:
    NUM_CHANNELS: 256
    FEATURE_TYPE: average
  TASK_NUM: 5
  TASK_INDEX:
    VASTTRACK: 0
    LASOT: 0
    TRACKINGNET: 0
    GOT10K: 0
    COCO: 0
    TNL2K: 1
    DEPTHTRACK: 2
    LASHER: 3
    VISEVENT: 4

TRAIN:
  TYPE: text_frozen
  PRETRAINED_PATH: /home/cps/czl/PDTrack_v3/pretrained/sutrack/sutrack_b224.pth.tar
  FREEZE_ENCODER: True
  ENCODER_OPEN:
  - stage3
  - mamba_fusion
  - temporal_mamba
  - depth_patch_embed
  - depth_pos_embed
  - depth_encoder
  ENCODER_MULTIPLIER: 0.2
  BATCH_SIZE: 4
  EPOCH: 20
  LR_DROP_EPOCH: 15
  SAVE_INTERVAL: 5
  GRAD_CLIP_NORM: 0.1
  LR: 0.00005
  NUM_WORKER: 2
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001

TEST:
  EPOCH: 20
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 224
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 112
  WINDOW: True
  NUM_TEMPLATES: 2
  UPDATE_INTERVALS:
    DEFAULT: 25
  UPDATE_THRESHOLD:
    DEFAULT: 0.70
  DEPTH_INFER_POLICY: bipeak
  BIPEAK_RATIO_TH: 0.60
  BIPEAK_DIST_TH: 0.15
  DEPTH_REINFER_COOLDOWN: 1
  UPDATE_DEPTH_VAR_MIN: 0.0001
  UPDATE_DEPTH_VAR_MAX: 500.0
  UPDATE_SEMANTIC_TH: 0.7
  MULTI_MODAL_VISION:
    DEFAULT: True
  MULTI_MODAL_LANGUAGE:
    DEFAULT: False
  USE_NLP:
    DEFAULT: False
    TNL2K: False