DATA:
  MAX_SAMPLE_INTERVAL: 400
  MULTI_MODAL_LANGUAGE: False
  MULTI_MODAL_VISION: True
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.500
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 384
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.500
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 192
    NUMBER: 2
  TRAIN:
    DATASETS_NAME:
    - LASOT
    # - GOT10K_vottrain
    # - COCO17
    # - TRACKINGNET
    # - VASTTRACK
    # - TNL2K_train
    # - DepthTrack_train
    # - VisEvent
    # - LasHeR_train
    DATASETS_RATIO:
    # - 4
    # - 4
    # - 4
    # - 4
    # - 4
    # - 4
    # - 2
    # - 2
    - 1
    SAMPLE_PER_EPOCH: 40000
  USE_NLP:
    TNL2K: True
  # DGCL:
  #   ENABLE: True
  #   WEIGHT: 1.0
MODEL:
  ENCODER:
    TYPE: fastitpnb
    STRIDE: 16
    PRETRAIN_TYPE: 'pretrained/itpn/fast_itpn_base_clipl_e1600.pt' # This parameter is not activated for now.
    PATCHEMBED_INIT: halfcopy
    DROP_PATH: 0.1
    TOKEN_TYPE_INDICATE: True
  MAMBA:
    ENABLE: True        # 开启 Mamba 融合
    DEPTH: 2            # 融合层数 (建议 2-4)
    DIM: 512            # 必须匹配 fastitpnb 的 embed_dim (512)
    DROP_PATH: 0.1      # 防止过拟合
  TEXT_ENCODER:
    TYPE: ViT-L/14
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  TASK_DECODER:
    NUM_CHANNELS: 256
    FEATURE_TYPE: average
  TASK_NUM: 5
  TASK_INDEX:
    VASTTRACK: 0
    LASOT: 0
    TRACKINGNET: 0
    GOT10K: 0
    COCO: 0
    TNL2K: 1
    DEPTHTRACK: 2
    LASHER: 3
    VISEVENT: 4
TRAIN:
  TYPE: text_frozen
  ENCODER_MULTIPLIER: 0.1
  BATCH_SIZE: 8
  EPOCH: 180
  SAVE_INTERVAL: 1 #测试能否保存权重
  GRAD_CLIP_NORM: 0.1
  LR: 0.0001
  LR_DROP_EPOCH: 144
  NUM_WORKER: 1
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001
TEST:
  EPOCH: 180
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 384
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 192
  WINDOW: True
  NUM_TEMPLATES: 2
  UPDATE_INTERVALS:
    DEFAULT: 25
  UPDATE_THRESHOLD:
    DEFAULT: 0.70
  UPDATE_DEPTH_VAR_MIN: 0.0001 # 深度方差下限
  UPDATE_DEPTH_VAR_MAX: 500.0  # 深度方差上限
  UPDATE_SEMANTIC_TH: 0.7      # 语义一致性阈值
  MULTI_MODAL_VISION:
    DEFAULT: False
  MULTI_MODAL_LANGUAGE:
    DEFAULT: False
  USE_NLP:
    DEFAULT: False
    TNL2K: True

