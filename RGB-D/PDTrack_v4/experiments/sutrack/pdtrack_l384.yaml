DATA:
  MAX_SAMPLE_INTERVAL: 400
  MULTI_MODAL_LANGUAGE: False
  MULTI_MODAL_VISION: True
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.500  # 深度通道均值 (正常范围 0~1 的深度图)
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 384
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.500  # 深度通道方差
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 192
    NUMBER: 2
  TRAIN:
    DATASETS_NAME:
    - LASOT
    - GOT10K_hard
    LASOT_SPLIT: hard_dense_subset
    LASOT_SPLIT_FILE: "/home/cps/czl/RGBDL/lasot_hard.txt"  # 确保这个 txt 文件里存了你要训练的视频名字
    DATASETS_RATIO:
    - 1
    - 1
    SAMPLE_PER_EPOCH: 40000
  USE_NLP:
    TNL2K: False

MODEL:
  ENCODER:
    TYPE: fastitpnl
    STRIDE: 16
    PRETRAIN_TYPE: 'pretrained/itpn/fast_itpn_large_1600e_1k.pt'
    PATCHEMBED_INIT: halfcopy  # 对于 4 通道，将 RGB 卷积核复制一半给 Depth 非常聪明
    DROP_PATH: 0.1
    TOKEN_TYPE_INDICATE: True
  MAMBA:
    ENABLE: True
    DEPTH: 2
    DIM: 768
    DROP_PATH: 0.1
    WINDOW_SIZE: 14
    FUSION_TYPE: "mssm_lite"
    D_STATE: 8
    D_CONV: 3
    EXPAND: 1
    DT_RANK: "auto"
    MOD_SCALE_INIT: 0.0
    SEARCH_GATE: True
    TEMPLATE_GATE: True
    TEMPLATE_GATE_INIT: 0.1
  TEXT_ENCODER:
    TYPE: ViT-L/14
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  TASK_DECODER:
    NUM_CHANNELS: 256
    FEATURE_TYPE: average
  TASK_NUM: 5
  TASK_INDEX:
    VASTTRACK: 0
    LASOT: 0
    TRACKINGNET: 0
    GOT10K: 0
    COCO: 0
    TNL2K: 1
    DEPTHTRACK: 2
    LASHER: 3
    VISEVENT: 4

TRAIN:
  TYPE: text_frozen
  # 【修复 1】：必须指向具体的 .pth.tar 文件！请根据你实际的文件名修改！
  PRETRAINED_PATH: /home/cps/czl/PDTrack_v2/pretrained/sutrack/sutrack_l384.pth.tar
  FREEZE_ENCODER: True
  # 【警告】：下面列表里的名字，必须是你代码里写的 self.xxx 真实的变量名
  ENCODER_OPEN:
  - stage3
  - mamba_fusion
  - depth_patch_embed
  - depth_pos_embed
  - depth_encoder
  ENCODER_MULTIPLIER: 0.2
  BATCH_SIZE: 5
  # 【修复 2】：统一 Epoch 和 Drop 逻辑
  EPOCH: 20
  LR_DROP_EPOCH: 15
  SAVE_INTERVAL: 5
  GRAD_CLIP_NORM: 0.1
  # 【修复 3】：微调预训练大模型，Batch=4，学习率必须调小，防止灾难性遗忘
  LR: 0.00005
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001

TEST:
  EPOCH: 20
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 384
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 192
  WINDOW: True
  NUM_TEMPLATES: 2
  UPDATE_INTERVALS:
    DEFAULT: 25
    GOT10K: 9999
  UPDATE_THRESHOLD:
    DEFAULT: 0.70
  UPDATE_DEPTH_VAR_MIN: 0.0001
  UPDATE_DEPTH_VAR_MAX: 500.0
  UPDATE_SEMANTIC_TH: 0.7
  MULTI_MODAL_VISION:
    DEFAULT: True
  MULTI_MODAL_LANGUAGE:
    DEFAULT: False
  USE_NLP:
    DEFAULT: False
    TNL2K: False