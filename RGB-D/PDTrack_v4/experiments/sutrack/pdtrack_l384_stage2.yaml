DATA:
  MAX_SAMPLE_INTERVAL: 400
  SAMPLER_MODE: full_sequence
  MULTI_MODAL_LANGUAGE: False
  MULTI_MODAL_VISION: True
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.500
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 384
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.500
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 192
    NUMBER: 2
  TRAIN:
    DATASETS_NAME:
    - LASOT
    - GOT10K_hard
    LASOT_SPLIT: hard_dense_subset
    LASOT_SPLIT_FILE: "/home/cps/czl/RGBDL/lasot_hard.txt"
    DATASETS_RATIO:
    - 1
    - 1
    SAMPLE_PER_EPOCH: 40000
  USE_NLP:
    TNL2K: False

MODEL:
  ENCODER:
    TYPE: fastitpnl
    STRIDE: 16
    PRETRAIN_TYPE: 'pretrained/itpn/fast_itpn_large_1600e_1k.pt'
    PATCHEMBED_INIT: halfcopy
    DROP_PATH: 0.1
    TOKEN_TYPE_INDICATE: True
  MAMBA:
    ENABLE: True
    DEPTH: 2
    DIM: 768
    DROP_PATH: 0.1
    WINDOW_SIZE: 14
    FUSION_TYPE: "mssm_lite"
    D_STATE: 8
    D_CONV: 3
    EXPAND: 1
    DT_RANK: "auto"
    MOD_SCALE_INIT: 0.0
    SEARCH_GATE: True
    TEMPLATE_GATE: True
    TEMPLATE_GATE_INIT: 0.1
  TEXT_ENCODER:
    TYPE: ViT-L/14
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  TASK_DECODER:
    NUM_CHANNELS: 256
    FEATURE_TYPE: average
  TASK_NUM: 5
  TASK_INDEX:
    VASTTRACK: 0
    LASOT: 0
    TRACKINGNET: 0
    GOT10K: 0
    COCO: 0
    TNL2K: 1
    DEPTHTRACK: 2
    LASHER: 3
    VISEVENT: 4

TRAIN:
  TYPE: normal
  PRETRAINED_PATH: /home/cps/czl/PDTrack_v2/checkpoints/train/sutrack/pdtrack_l384/SUTRACK_ep0001.pth.tar
  FREEZE_ENCODER: False
  ENCODER_OPEN: []
  ENCODER_MULTIPLIER: 0.05
  BATCH_SIZE: 4
  EPOCH: 12
  LR_DROP_EPOCH: 10
  SAVE_INTERVAL: 5
  GRAD_CLIP_NORM: 0.1
  LR: 0.00002
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
