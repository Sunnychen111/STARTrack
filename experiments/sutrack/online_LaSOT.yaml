# stage4_lasot_three_stage.yaml

paths:
  # 原始 SUTrack checkpoint
  sutrack_ckpt: /home/cps/czl/STARTrack_v5/checkpoints/sutrack_b384/SUTRACK_ep0180.pth.tar

  # 前面 Stage0-3 训练得到的 reranker / disambiguator checkpoint
  reranker_ckpt: /home/cps/czl/STARTrack_v5/checkpoints/startrack_mamba_iou_b384/best.pth

  # Stage4 输出目录
  output_dir: /home/cps/czl/STARTrack_v5/checkpoints/stage4_lasot_three_stage_b384

  # SUTrack 配置文件
  config: /home/cps/czl/STARTrack_v5/experiments/sutrack/sutrack_b384.yaml


data:
  dataset: lasot
  use_lmdb: false

  # 三路混合采样：hard_frame + hard_seq + full
  stage4_sampling_mode: hard_frame_mixed

  # LaSOT hard-frame txt
  hard_frame_list: //home/cps/czl/STARTrack_v5/stage4_hard_frames/lasot_hard_frame_anchor_list.txt

  # 如果你有 LaSOT hard sequence txt，就填这里
  # 如果没有，可以先注释掉或设为 null，脚本会从 hard_frame 自动推导 hard_seq
  hard_seq_list: null

  # 推荐比例
  hard_frame_ratio: 0.7
  hard_seq_ratio: 0.1
  full_ratio: 0.2

  # hard-frame anchor 附近采样范围
  # -1 表示默认使用 rollout_len - 1
  anchor_jitter: -1

  min_anchor_valid_frames: 1
  max_anchor_retry: 20


training:
  epochs: 10
  samples_per_epoch: 3000
  rollout_len: 8
  topk: 8
  batch_size: 1
  num_workers: 4
  device: cuda
  seed: 42

  # Stage4 建议冻结 encoder
  freeze_encoder: true

  # 第一轮建议先不解冻 decoder，稳定后再开
  unfreeze_decoder: false

  history_len: 32
  detach_history: true

  # 三阶段自动 curriculum
  update_mode: auto

  # 三阶段划分：
  # Epoch 1-2: coach
  # Epoch 3-4: scheduled_takeover
  # Epoch 5-6: safe_predicted
  coach_epochs: 3
  scheduled_takeover_epochs: 4

  # teacher probability 只主要影响 coach / scheduled_takeover
  teacher_prob_start: 0.8
  teacher_prob_end: 0.2
  teacher_decay_epochs: 4

  # scheduled_takeover 阶段接管阈值
  takeover_prob_thresh: 0.35

  # safe_predicted 阶段更严格
  safe_pred_prob_thresh: 0.45

  # 运动约束，防止突然跳到干扰物
  max_motion_norm: 4.0
  max_scale_ratio: 4.0


loss:
  iou_thresh: 0.3
  apply_gain_thr: 0.10
  best_iou_thr: 0.50
  apply_threshold: 0.50

  rank_lambda: 0.05
  margin: 0.2


optimizer:
  lr_reranker: 0.00001
  lr_decoder: 0.000001
  weight_decay: 0.0001
  grad_clip_norm: 1.0


logging:
  save_every: 1
  print_every: 20